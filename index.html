<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stilt AI — Coming Soon</title>
  <meta name="description" content="Each customer matters. The game-changing solution is on its way for your biggest problems." />
  <meta property="og:title" content="Stilt AI — Coming Soon" />
  <meta property="og:description" content="Each customer matters. The game-changing solution is on its way for your biggest problems." />
  <meta property="og:image" content="hero.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { color: white; background: #070711; overflow-x: hidden; }
    .page { min-height: 100vh; position: relative; isolation: isolate; display: flex; flex-direction: column; padding: 34px clamp(22px, 5vw, 76px); background: radial-gradient(circle at 74% 50%, rgba(111, 91, 255, 0.34), transparent 32%), radial-gradient(circle at 16% 24%, rgba(92, 124, 255, 0.18), transparent 26%), linear-gradient(135deg, #06060d 0%, #090914 45%, #05050a 100%); }
    .page:before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px); background-size: 64px 64px; mask-image: radial-gradient(circle at 50% 40%, black, transparent 72%); z-index: -2; }
    .orb { position: absolute; width: 520px; height: 520px; right: 10%; top: 18%; border-radius: 999px; background: #6d5df6; filter: blur(110px); opacity: .18; animation: drift 10s ease-in-out infinite; z-index: -1; }
    nav { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 3; }
    .brand { display: flex; align-items: center; gap: 13px; font-size: 28px; font-weight: 800; letter-spacing: -.04em; }
    .mark { width: 36px; height: 36px; display: grid; place-items: center; color: #8b7cff; filter: drop-shadow(0 0 22px rgba(109,93,246,.8)); font-size: 34px; }
    .pill { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.045); color: rgba(255,255,255,.84); border-radius: 999px; padding: 10px 18px; font-weight: 600; backdrop-filter: blur(14px); box-shadow: inset 0 1px 0 rgba(255,255,255,.08); }
    .hero { flex: 1; display: grid; grid-template-columns: minmax(0, 0.9fr) minmax(420px, 1.05fr); align-items: center; gap: 36px; padding: 42px 0 20px; }
    .copy { max-width: 690px; }
    h1 { margin: 0 0 30px; font-size: clamp(58px, 8vw, 112px); line-height: .92; letter-spacing: -.075em; font-weight: 800; }
    h1 .accent { display: block; background: linear-gradient(135deg, #ffffff 0%, #a2b5ff 46%, #8a73ff 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .subtitle { max-width: 590px; margin: 0 0 40px; color: rgba(255,255,255,.68); font-size: clamp(20px, 2vw, 28px); line-height: 1.45; letter-spacing: -.035em; }
    .form { display: flex; width: min(610px, 100%); padding: 7px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.045); border-radius: 22px; backdrop-filter: blur(16px); box-shadow: 0 22px 70px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.08); }
    input { min-width: 0; flex: 1; border: 0; outline: none; color: white; background: transparent; font: inherit; font-size: 17px; padding: 0 20px; }
    input::placeholder { color: rgba(255,255,255,.42); }
    button { border: 0; color: white; cursor: pointer; font: inherit; font-weight: 800; font-size: 17px; border-radius: 17px; padding: 18px 27px; background: linear-gradient(135deg, #7b61ff, #5977ff); box-shadow: 0 16px 36px rgba(91, 93, 246, .35); transition: transform .2s ease, box-shadow .2s ease; white-space: nowrap; }
    button:hover { transform: translateY(-2px); box-shadow: 0 20px 42px rgba(91, 93, 246, .45); }
    .message { height: 24px; margin-top: 16px; color: rgba(255,255,255,.58); font-size: 15px; }
    .visual { min-height: 620px; display: flex; align-items: center; justify-content: center; position: relative; }
    .card { width: min(100%, 720px); aspect-ratio: 1.15 / 1; border-radius: 38px; position: relative; overflow: hidden; background: radial-gradient(circle at 50% 45%, rgba(109,93,246,.36), rgba(255,255,255,.04) 54%, rgba(255,255,255,.025)); border: 1px solid rgba(255,255,255,.1); box-shadow: 0 40px 100px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.08); }
    .card img { width: 112%; height: 112%; object-fit: cover; object-position: center; transform: translateX(-4%) translateY(-3%); animation: float 4.5s ease-in-out infinite; filter: saturate(1.08) contrast(1.02); }
    .shine { position: absolute; inset: 0; background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,.08) 38%, transparent 54%); mix-blend-mode: screen; pointer-events: none; }
    footer { color: rgba(255,255,255,.38); font-size: 14px; padding-bottom: 6px; }
    @keyframes float { 0%, 100% { transform: translateX(-4%) translateY(-3%) scale(1); } 50% { transform: translateX(-4%) translateY(-6%) scale(1.015); } }
    @keyframes drift { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-42px, 26px); } }
    @media (max-width: 980px) { body { overflow: auto; } .page { min-height: auto; } .hero { grid-template-columns: 1fr; padding-top: 70px; } .visual { min-height: auto; } .card { max-width: 620px; } footer { margin-top: 32px; } }
    @media (max-width: 560px) { nav { align-items: flex-start; gap: 16px; } .pill { font-size: 14px; padding: 9px 14px; } .form { flex-direction: column; } input { padding: 18px 16px; } button { width: 100%; } .card { border-radius: 28px; } }
  </style>
</head>
<body>
  <main class="page">
    <div class="orb"></div>
    <nav><div class="brand"><span class="mark">✦</span><span>Stilt AI</span></div><div class="pill">Coming Soon</div></nav>
    <section class="hero">
      <div class="copy">
        <h1>Each customer <span class="accent">matters.</span></h1>
        <p class="subtitle">The game-changing solution is on its way for your biggest problems.</p>
        <form class="form" id="notifyForm"><input id="email" type="email" placeholder="Enter your email" required /><button type="submit">Notify Me →</button></form>
        <div class="message" id="message">Be the first to know when we launch.</div>
      </div>
      <div class="visual"><div class="card"><img src="hero.png" alt="A joyful customer celebrating" /><div class="shine"></div></div></div>
    </section>
    <footer>© 2026 Stilt AI · Made with ❤️ for businesses that care about every customer.</footer>
  </main>
  <script>const form=document.getElementById("notifyForm"),message=document.getElementById("message");form.addEventListener("submit",function(e){e.preventDefault();message.textContent="Thank you! We'll let you know.";form.reset();});</script>
</body>
</html>
