<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stilt AI</title>
  <meta name="description" content="Each customer matters. Why not to make each of them happy!" />
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #05050c;
      color: white;
    }

    body {
      overflow: hidden;
    }

    .page {
      width: 100vw;
      height: 100vh;
      position: relative;
      padding: 42px 5vw 38px;
      background:
        linear-gradient(rgba(120, 96, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 96, 255, 0.055) 1px, transparent 1px),
        radial-gradient(circle at 72% 46%, rgba(120, 65, 255, 0.44), transparent 33%),
        radial-gradient(circle at 10% 12%, rgba(95, 90, 255, 0.16), transparent 22%),
        #05050c;
      background-size: 92px 92px, 92px 92px, auto, auto, auto;
      overflow: hidden;
    }

    .nav {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.055em;
    }

    .star {
      color: #8b73ff;
      font-size: 42px;
      line-height: 1;
      filter: drop-shadow(0 0 22px rgba(124, 94, 255, 0.75));
    }

    .badge {
      padding: 15px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.045);
      color: rgba(255,255,255,0.88);
      font-weight: 800;
      font-size: 17px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .hero {
      height: calc(100vh - 90px);
      display: grid;
      grid-template-columns: 48% 52%;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .copy {
      position: relative;
      z-index: 4;
      padding-top: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(72px, 8.2vw, 132px);
      line-height: 0.94;
      letter-spacing: -0.085em;
      font-weight: 1000;
      text-shadow: 0 18px 50px rgba(0,0,0,0.42);
    }

    .gradient {
      display: inline-block;
      background: linear-gradient(90deg, #e9edff 0%, #bfcaff 48%, #816dff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin-top: 30px;
      max-width: 700px;
      color: rgba(255,255,255,0.72);
      font-size: clamp(26px, 2.3vw, 38px);
      line-height: 1.35;
      letter-spacing: -0.045em;
      font-weight: 600;
    }

    .subtitle .happy {
      color: #8b61ff;
      text-decoration: underline;
      text-decoration-thickness: 5px;
      text-underline-offset: 8px;
      text-decoration-color: rgba(139, 97, 255, 0.85);
    }

    .form {
      margin-top: 38px;
      width: min(690px, 100%);
      display: flex;
      align-items: center;
      border: 1px solid rgba(139, 97, 255, 0.42);
      background: rgba(10, 10, 18, 0.78);
      border-radius: 21px;
      padding: 8px;
      box-shadow: 0 0 34px rgba(120, 76, 255, 0.18);
      backdrop-filter: blur(16px);
    }

    .mail-icon {
      width: 62px;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.68);
      font-size: 28px;
    }

    input {
      flex: 1;
      min-width: 0;
      height: 62px;
      border: 0;
      outline: 0;
      background: transparent;
      color: white;
      font-size: 22px;
      font-weight: 500;
      padding: 0 22px 0 0;
    }

    input::placeholder {
      color: rgba(255,255,255,0.42);
    }

    button {
      height: 62px;
      border: 0;
      border-radius: 16px;
      padding: 0 34px;
      cursor: pointer;
      color: white;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, #7a55ff 0%, #5b6eff 100%);
      box-shadow: 0 12px 36px rgba(113, 80, 255, 0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 46px rgba(113, 80, 255, 0.58);
    }

    .note {
      margin-top: 22px;
      color: rgba(255,255,255,0.64);
      font-size: 20px;
      font-weight: 600;
    }

    .note span {
      color: #8b61ff;
      margin-right: 10px;
    }

    .visual {
      position: absolute;
      right: -2vw;
      top: 10vh;
      width: 59vw;
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }

    .visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 30px 70px rgba(123, 83, 255, 0.34));
      animation: float 4.5s ease-in-out infinite;
    }

    .trust {
      position: absolute;
      left: 50%;
      bottom: 3.4vh;
      transform: translateX(-50%);
      width: min(1120px, 88vw);
      text-align: center;
      z-index: 4;
    }

    .trust-title {
      color: #a780ff;
      font-size: 16px;
      letter-spacing: 0.22em;
      font-weight: 800;
      margin-bottom: 28px;
    }

    .logos {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255,255,255,0.58);
      font-size: clamp(18px, 2vw, 29px);
      gap: 22px;
      opacity: 0.86;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-18px) scale(1.012); }
    }

    @media (max-width: 950px) {
      body { overflow: auto; }
      .page {
        min-height: 100vh;
        height: auto;
        padding: 28px 24px 42px;
      }
      .badge { display: none; }
      .hero {
        height: auto;
        display: block;
        padding-top: 58px;
      }
      h1 { font-size: clamp(60px, 17vw, 88px); }
      .subtitle { font-size: 25px; }
      .form { flex-direction: column; align-items: stretch; }
      .mail-icon { display: none; }
      input { padding: 0 18px; }
      button { width: 100%; }
      .visual {
        position: relative;
        right: auto;
        top: auto;
        width: 100%;
        height: 420px;
        margin-top: 28px;
      }
      .trust {
        position: relative;
        left: auto;
        bottom: auto;
        transform: none;
        width: 100%;
        margin-top: 20px;
      }
      .logos {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="nav">
      <div class="brand"><span class="star">✦</span><span>Stilt AI</span></div>
      <div class="badge">Coming Soon</div>
    </nav>

    <section class="hero">
      <div class="copy">
        <h1>Each<br>customer<br><span class="gradient">matters.</span></h1>
        <div class="subtitle">Why not to make each of them <span class="happy">happy!</span></div>

        <form class="form" id="notifyForm">
          <div class="mail-icon">✉</div>
          <input id="email" type="email" placeholder="Enter your email" required />
          <button type="submit">Notify Me →</button>
        </form>

        <div class="note" id="message"><span>▣</span>No spam. Just updates.</div>
      </div>
    </section>

    <div class="visual">
      <img src="./jumping-customer.png?v=10" alt="Happy customer celebrating">
    </div>

    <div class="trust">
      <div class="trust-title">TRUSTED BY BUSINESSES OF ALL SIZES</div>
      <div class="logos">
        <span>✂ barberhub</span>
        <span>♧ SPA&ME</span>
        <span>BeautyCo.</span>
        <span>▰ WELLNESS</span>
        <span>♛ HAIRLINE</span>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById("notifyForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(event) {
      event.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!email) return;
      message.innerHTML = "<span>✓</span>Thank you! We'll let you know.";
      form.reset();
    });
  </script>
</body>
</html>
