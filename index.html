<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stilt AI</title>
  <meta name="description" content="Each customer matters. Why not to make each of them happy!" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #05050c;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .site {
      width: 100vw;
      height: 100vh;
      background-image: url("hero.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .site {
        width: 100vw;
        min-height: 100vh;
        background-size: cover;
        background-position: left center;
      }
    }
  </style>
</head>
<body>
  <main class="site" aria-label="Stilt AI coming soon landing page"></main>
</body>
</html>
