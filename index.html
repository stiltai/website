<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stilt AI</title>
  <meta name="description" content="Each customer matters. Why not to make each of them happy!" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #05050c;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 66.6667vw;
      min-height: 100vh;
      background: #05050c;
      overflow: hidden;
    }

    .hero-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: auto;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .email-form {
      position: absolute;
      left: 4.85vw;
      top: 44vw;
      width: 39.8vw;
      height: 5.7vw;
      z-index: 10;
      display: flex;
      align-items: center;
    }

    .email-form input {
      width: 61%;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: white;
      font-size: 1.45vw;
      padding-left: 5.5vw;
      padding-right: 1vw;
    }

    .email-form input::placeholder {
      color: transparent;
    }

    .email-form button {
      width: 39%;
      height: 100%;
      border: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
    }

    .message {
      position: absolute;
      left: 5.25vw;
      top: 51.3vw;
      color: rgba(255,255,255,0.8);
      font-size: 1.05vw;
      font-weight: 600;
      z-index: 11;
      opacity: 0;
    }

    .message.show {
      opacity: 1;
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .wrap {
        width: 100vw;
        height: 66.6667vw;
        min-height: auto;
      }

      .email-form input {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="hero-image" src="stiltai-final-bg.png?v=200" alt="Stilt AI landing page">

    <form class="email-form" id="form">
      <input id="email" type="text" autocomplete="email" />
      <button type="submit">Notify Me</button>
    </form>

    <div class="message" id="message">Thank you! We'll let you know.</div>
  </main>

  <script>
    const form = document.getElementById("form");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      message.classList.add("show");
      form.reset();
    });
  </script>
</body>
</html>
