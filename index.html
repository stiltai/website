<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stilt AI</title>
  <meta name="description" content="Each customer matters. Why not to make each of them happy!" />
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #05050c;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #05050c;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      user-select: none;
      pointer-events: none;
    }

    .email-form {
      position: absolute;
      left: 5.1vw;
      top: 66.2vh;
      width: 37.4vw;
      height: 8.8vh;
      display: flex;
      align-items: center;
      z-index: 10;
    }

    .email-form input {
      width: 60%;
      height: 100%;
      background: transparent;
      border: 0;
      outline: 0;
      color: #ffffff;
      font-size: clamp(16px, 1.55vw, 24px);
      padding-left: 5.4vw;
      padding-right: 1vw;
    }

    .email-form input::placeholder {
      color: transparent;
    }

    .email-form button {
      width: 40%;
      height: 100%;
      border: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
    }

    .message {
      position: absolute;
      left: 5.2vw;
      top: 76.9vh;
      z-index: 11;
      color: rgba(255,255,255,0.78);
      font-size: clamp(13px, 1.2vw, 18px);
      font-weight: 600;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .message.visible {
      opacity: 1;
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .stage {
        min-height: 100vh;
      }
      .bg {
        object-fit: cover;
        object-position: 34% center;
      }
      .email-form {
        left: 5vw;
        top: 66vh;
        width: 46vw;
        height: 8vh;
      }
      .email-form input {
        font-size: 14px;
        padding-left: 7vw;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <img class="bg" src="./stiltai-final-bg.png?v=99" alt="Stilt AI landing page">

    <form class="email-form" id="form">
      <input id="email" type="email" placeholder="Enter your email" required>
      <button type="submit" aria-label="Notify Me">Notify Me</button>
    </form>

    <div class="message" id="message">Thank you! We'll let you know.</div>
  </main>

  <script>
    const form = document.getElementById("form");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      message.classList.add("visible");
      form.reset();
    });
  </script>
</body>
</html>
